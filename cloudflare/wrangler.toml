name = "ppptv-auto-poster"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron schedule — runs every 30 minutes
# Adjust as needed: "0 * * * *" = every hour, "*/15 * * * *" = every 15 min
[triggers]
crons = ["*/30 * * * *"]

# Secrets (set via: wrangler secret put AUTOMATE_SECRET)
# VERCEL_APP_URL
# AUTOMATE_SECRET
