name = "ppptv-auto-poster"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron: every 30 minutes
[triggers]
crons = ["*/10 * * * *"]

# Cloudflare KV namespace for deduplication
# Create with: wrangler kv:namespace create SEEN_ARTICLES
# Then paste the returned id below
[[kv_namespaces]]
binding = "SEEN_ARTICLES"
id = "fa43238e08df4ef691d8bfcde1160f14"

# Secrets (set via wrangler secret put):
#   VERCEL_APP_URL   = https://your-app.vercel.app
#   AUTOMATE_SECRET  = your_secret_token
